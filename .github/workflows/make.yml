name: Build and Run Tests

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# JaffarPlus' NUMA/threading model assumes threads are pinned 1:1 to cores (it reads each
# thread's CPU via sched_getcpu and indexes per-thread/per-NUMA structures by it). Without
# pinning, those indices drift and the multi-threaded engine run can crash. Pin threads in CI
# the same way the engine is meant to run.
env:
  OMP_PROC_BIND: "true"
  OMP_PLACES: cores

jobs:

  # Build documentation and checking proper style
  docs:
    runs-on: ubuntu-latest
    # Style check is advisory: report formatting issues without blocking CI
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Updating Apt
      run: sudo apt update
    - name: Installing apt packages
      run: sudo apt install doxygen graphviz
    # Pin clang-format to an exact version (via pip) so CI output matches the
    # version run locally. clang-format reformats slightly differently between
    # patch releases, so without pinning the style check fails on harmless drift
    # (e.g. apt's 18.1.3 vs. a developer's 18.1.8) rather than real violations.
    - name: Installing pinned clang-format
      run: python3 -m pip install 'clang-format==18.1.8'
    - name: Checking proper code styling
      run:  |
            git submodule init extern/jaffarCommon
            git submodule update extern/jaffarCommon
            cp extern/jaffarCommon/.clang-format .
            clang-format --version
            extern/jaffarCommon/.build-tools/check-style.sh check source
            extern/jaffarCommon/.build-tools/check-style.sh check games
            extern/jaffarCommon/.build-tools/check-style.sh check emulators
    # Build the engine API reference (HTML) from source/ via Doxygen. WARN_IF_UNDOCUMENTED is on, so
    # the warning log doubles as a completeness signal; it is printed for visibility. Graphviz (dot)
    # is installed above so class diagrams render.
    - name: Building API reference (Doxygen)
      run:  |
            # Doxygen does not create nested parent directories for OUTPUT_DIRECTORY, and this job
            # never runs `meson setup`, so create the output path first.
            mkdir -p build/doxygen
            doxygen Doxyfile
            echo "----- Doxygen warnings (should be empty) -----"
            cat build/doxygen/doxygen-warnings.log || true
    - name: Uploading API reference
      uses: actions/upload-artifact@v4
      with:
        name: api-reference
        path: build/doxygen/html

  # Build (TestEmulator) + engine correctness tests.
  # The test emulator/game are in-repo (no ROM, no emulator submodule), so this is a fast,
  # deterministic correctness gate exercising the engine's main execution path.
  build-TestEmulator:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Checkout jaffarCommon
      run: |
            git submodule init extern/jaffarCommon
            git submodule update extern/jaffarCommon
    - name: Create build directory
      run: mkdir build
    - name: Installing meson and ninja
      run: python3 -m pip install meson ninja
    - name: Updating Apt
      run: sudo apt update
    - name: Installing apt packages
      run: sudo apt install libgtest-dev libnuma-dev libtbb-dev libsdl2-dev libsdl2-image-dev
    - name: Run meson configuration
      run: meson setup build -Dbuildtype=release -DuseNCurses=false -Demulator=TestEmulator
    - name: Building project
      run: ninja -C build
    - name: Running tests
      run: ninja test -C build

  # AddressSanitizer + UndefinedBehaviorSanitizer over the engine correctness tests.
  # The TestEmulator harness is ROM-less and deterministic, so this catches memory and UB bugs
  # in the engine's hot path automatically (e.g. the differential-compression buffer overflow).
  sanitizers-TestEmulator:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Checkout jaffarCommon
      run: |
            git submodule init extern/jaffarCommon
            git submodule update extern/jaffarCommon
    - name: Create build directory
      run: mkdir build
    - name: Installing meson and ninja
      run: python3 -m pip install meson ninja
    - name: Updating Apt
      run: sudo apt update
    - name: Installing apt packages
      run: sudo apt install libgtest-dev libnuma-dev libtbb-dev libsdl2-dev libsdl2-image-dev
    - name: Run meson configuration
      run: meson setup build -Dbuildtype=debug -Db_sanitize=address,undefined -Db_lundef=false -DuseNCurses=false -Demulator=TestEmulator
    - name: Building project
      run: ninja -C build
    - name: Running tests
      run: ninja test -C build
      env:
        ASAN_OPTIONS: detect_leaks=0
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  # Detailed-profiling build (-DdetailedProfiling=true). Fine-grained hot-loop timing is compiled out
  # by default, so this job keeps that code path from bitrotting: it builds with the option on, runs
  # the full correctness suite, and smoke-checks that the per-operation breakdown is actually emitted.
  profiling-TestEmulator:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Checkout jaffarCommon
      run: |
            git submodule init extern/jaffarCommon
            git submodule update extern/jaffarCommon
    - name: Create build directory
      run: mkdir build
    - name: Installing meson and ninja
      run: python3 -m pip install meson ninja
    - name: Updating Apt
      run: sudo apt update
    - name: Installing apt packages
      run: sudo apt install libgtest-dev libnuma-dev libtbb-dev libsdl2-dev libsdl2-image-dev
    - name: Run meson configuration
      run: meson setup build -Dbuildtype=release -DuseNCurses=false -Demulator=TestEmulator -DdetailedProfiling=true
    - name: Building project
      run: ninja -C build
    - name: Running tests
      run: ninja test -C build
    - name: Verifying the per-operation breakdown is emitted
      run: |
            cd tests/testEmulator
            out=$(JAFFAR_ENGINE_OVERRIDE_MAX_STATEDB_SIZE_MB=10 JAFFAR_ENGINE_OVERRIDE_MAX_HASHDB_SIZE_MB=100 OMP_NUM_THREADS=1 ../../build/jaffar gridWalker.jaffar 2>&1)
            # Substring test via bash builtin (not `grep -q`): under pipefail, grep -q closing the pipe
            # would SIGPIPE the writer and spuriously fail the step.
            if [[ "$out" == *"Runner State Avance"* ]]; then
              echo "OK: detailed per-operation breakdown is emitted"
            else
              echo "FAIL: detailed profiling enabled but the per-operation breakdown was not found"
              printf '%s\n' "$out" | tail -n 30
              exit 1
            fi

  # Code coverage over the engine, measured on the TestEmulator/GridWalker suite. That harness is
  # ROM-less and aimed squarely at JaffarPlus's own main execution path, so coverage here reflects
  # engine code (search, state/hash DBs, serialization, rules, reproduction) rather than being
  # diluted by emulator-core code as a real-emulator build would be.
  coverage-TestEmulator:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Checkout jaffarCommon
      run: |
            git submodule init extern/jaffarCommon
            git submodule update extern/jaffarCommon
    - name: Create build directory
      run: mkdir build
    - name: Installing meson and ninja
      run: python3 -m pip install meson ninja gcovr
    - name: Updating Apt
      run: sudo apt update
    - name: Installing apt packages
      run: sudo apt install libgtest-dev libnuma-dev libtbb-dev libsdl2-dev libsdl2-image-dev
    - name: Run meson configuration
      run: meson setup build -Dbuildtype=release -Db_coverage=true -DuseNCurses=false -Demulator=TestEmulator
    - name: Building project
      run: ninja -C build
    - name: Running tests
      run: ninja test -C build
    - name: Running coverage analysis
      run: ninja coverage-xml -C build
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: SergioMartin86/jaffarPlus
        fail_ci_if_error: true
        files: build/meson-logs/coverage.xml
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: meson-logs-coverage-TestEmulator
        path: build/meson-logs/

  # Build (QuickerNES) + tests. Validates the engine against a real emulator core/ROM; coverage is
  # measured separately on the TestEmulator harness (see coverage-TestEmulator).
